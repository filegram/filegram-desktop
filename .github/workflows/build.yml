name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: filegram-linux-x86_64
            binary: target/release/filegram
            asset: filegram-linux-x86_64
          - os: macos-latest
            artifact: filegram-macos-aarch64
            binary: target/release/filegram
            asset: filegram-macos-aarch64
          - os: windows-latest
            artifact: filegram-windows-x86_64
            binary: target/release/filegram.exe
            asset: filegram-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev pkg-config

      - name: Build release
        run: cargo build --release

      - name: Rename binary to asset name
        shell: bash
        run: cp '${{ matrix.binary }}' '${{ matrix.asset }}'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset }}

  release:
    name: Update "latest" release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Recreate "latest" release with fresh binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
          gh release create latest --repo "$GITHUB_REPOSITORY" \
            --title "Latest" \
            --notes "Automatic build from \`$GITHUB_SHA\`" \
            --latest \
            --target "$GITHUB_SHA" \
            dist/*

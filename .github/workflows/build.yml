name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: filegram-linux-x86_64
            binary: target/release/filegram
            asset: filegram-linux-x86_64
            zip: filegram-linux-x86_64.zip
          # The .dmg is already a compressed container — no extra zip.
          - os: macos-latest
            artifact: filegram-macos-universal
            binary: target/release/Filegram.dmg
            asset: filegram-macos-universal.dmg
          - os: windows-latest
            artifact: filegram-windows-x86_64
            binary: target/release/filegram.exe
            asset: filegram-windows-x86_64.exe
            zip: filegram-windows-x86_64.zip
          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact: filegram-windows-i686
            binary: target/i686-pc-windows-msvc/release/filegram.exe
            asset: filegram-windows-i686.exe
            zip: filegram-windows-i686.zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev pkg-config

      # On macOS the bundle script builds both architectures itself.
      - name: Build release
        if: runner.os != 'macOS'
        run: cargo build --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Bundle macOS app (universal)
        if: runner.os == 'macOS'
        run: ./scripts/bundle-macos.sh

      - name: Rename binary to asset name
        shell: bash
        run: cp '${{ matrix.binary }}' '${{ matrix.asset }}'

      - name: Create zip archive
        if: matrix.zip
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            7z a '${{ matrix.zip }}' '${{ matrix.asset }}'
          else
            zip '${{ matrix.zip }}' '${{ matrix.asset }}'
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.zip }}

  package-linux:
    name: Package (Linux deb/rpm/AppImage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev pkg-config

      - name: Install packaging tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build release
        run: cargo build --release

      - name: Build .deb package
        run: |
          cargo deb --no-build
          cp target/debian/*.deb filegram-linux-x86_64.deb

      - name: Build .rpm package
        run: |
          cargo generate-rpm
          cp target/generate-rpm/*.rpm filegram-linux-x86_64.rpm

      - name: Build AppImage
        run: |
          curl -fsSLO https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          # linuxdeploy looks the icon up by the Icon= name from the .desktop file.
          cp assets/icon/icon-512.png filegram.png
          APPIMAGE_EXTRACT_AND_RUN=1 OUTPUT=filegram-linux-x86_64.AppImage \
            ./linuxdeploy-x86_64.AppImage --appdir AppDir \
              --executable target/release/filegram \
              --desktop-file packaging/linux/filegram.desktop \
              --icon-file filegram.png \
              --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: filegram-linux-packages
          path: |
            filegram-linux-x86_64.deb
            filegram-linux-x86_64.rpm
            filegram-linux-x86_64.AppImage

  release:
    name: Update "latest" release
    needs: [build, package-linux]
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    concurrency:
      group: latest-release
      cancel-in-progress: true

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Recreate "latest" release with fresh binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete latest --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
          fi
          gh release create latest --repo "$GITHUB_REPOSITORY" \
            --title "Latest" \
            --notes "Automatic build from \`$GITHUB_SHA\`" \
            --latest \
            --target "$GITHUB_SHA" \
            dist/*

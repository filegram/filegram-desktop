name: Release

# Manually triggered with an explicit version. The flow:
#   1. prepare: commits the release version into Cargo.toml, tags vX.Y.Z,
#      then commits the follow-up dev version (X.Y.Z+1-dev) — one push.
#   2. build: reuses build.yml against the release tag.
#   3. publish: creates a permanent GitHub release with the binaries.
# Dev builds on master keep updating the rolling pre-release (build.yml).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string

permissions: {}

# One release at a time: concurrent runs would race on pushing to the
# default branch and creating tags. Never cancel a release mid-way.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Tag release ${{ inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: v${{ inputs.version }}

    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "error: version must be X.Y.Z, got '$VERSION'" >&2; exit 1; }

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Commit release version, tag, commit next dev version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null \
             || git ls-remote --exit-code --tags origin "v$VERSION" >/dev/null; then
            echo "error: tag v$VERSION already exists" >&2; exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          ./scripts/set-version.sh "$VERSION"
          git commit -am "Release $VERSION"
          git tag "v$VERSION"

          next="${VERSION%.*}.$(( ${VERSION##*.} + 1 ))-dev"
          ./scripts/set-version.sh "$next"
          git commit -am "Start $next"

          git push origin "HEAD:${{ github.event.repository.default_branch }}" "v$VERSION"

  build:
    name: Build release tag
    needs: prepare
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    with:
      ref: ${{ needs.prepare.outputs.tag }}

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --title "Filegram $VERSION" \
            --generate-notes \
            --verify-tag \
            --latest \
            dist/*

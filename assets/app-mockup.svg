<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Ubuntu, sans-serif">
  <!-- Window -->
  <rect x="0" y="0" width="900" height="600" rx="10" fill="#2B2B2B"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="900" height="48" fill="#333333"/>

  <!-- Left zone: New scan, Rescan, Go up, then the current path -->
  <!-- New scan button: outline chrome button with a home icon + label -->
  <rect x="12" y="10" width="120" height="28" rx="4" fill="none" stroke="#555555" stroke-width="1"/>
  <g transform="translate(20,16) scale(0.6667)" fill="none" stroke="#E0E0E0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </g>
  <text x="44" y="29" fill="#E0E0E0" font-size="14">New scan</text>

  <!-- Rescan button (icon only) -->
  <rect x="140" y="10" width="32" height="28" rx="4" fill="none" stroke="#555555" stroke-width="1"/>
  <g transform="translate(148,16) scale(0.6667)" fill="none" stroke="#E0E0E0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"/>
    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
  </g>

  <!-- Go up button (icon only) -->
  <rect x="180" y="10" width="32" height="28" rx="4" fill="none" stroke="#555555" stroke-width="1"/>
  <g stroke="#E0E0E0" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M196 30 V18"/>
    <path d="M191 23 L196 18 L201 23"/>
  </g>

  <!-- Current path -->
  <text x="224" y="29" fill="#9E9E9E" font-size="14">/Users/stan/projects</text>

  <!-- Right zone: scan tally (file count + collected size), then the free-space gauge -->
  <!-- Stacked-layers glyph + file count (monospace) -->
  <g transform="translate(547,16) scale(0.6667)" fill="none" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 2 7 12 12 22 7 12 2"/>
    <polyline points="2 17 12 22 22 17"/>
    <polyline points="2 12 12 17 22 12"/>
  </g>
  <text x="569" y="29" fill="#9E9E9E" font-size="14" font-family="ui-monospace, 'SF Mono', Menlo, monospace">184203</text>

  <!-- Pie-chart glyph + collected size (monospace) -->
  <g transform="translate(631,16) scale(0.6667)" fill="none" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
    <path d="M22 12A10 10 0 0 0 12 2v10z"/>
  </g>
  <text x="653" y="29" fill="#9E9E9E" font-size="14" font-family="ui-monospace, 'SF Mono', Menlo, monospace">21.4 GB</text>

  <!-- Free-space gauge pinned to the far right: label above an amber fill on a muted track -->
  <text x="814" y="20" fill="#9E9E9E" font-size="11" text-anchor="middle">182.4 GB free of 494.4 GB</text>
  <rect x="744" y="29" width="140" height="6" rx="3" fill="#454545"/>
  <rect x="744" y="29" width="87" height="6" rx="3" fill="#F9A825"/>

  <!-- Map background -->
  <rect x="0" y="48" width="900" height="508" fill="#1C1C1C"/>

  <!-- Treemap bricks: folders (orange), files (teal), rest (gray).
       Size caption sits in the top-left corner (muted); the name is centred. -->
  <g stroke-width="1.5">
    <!-- top row -->
    <!-- folder: .git -->
    <rect x="4" y="52" width="300" height="182" fill="#F9A825" stroke="#582B04"/>
    <g fill="#FBC02D" stroke="#582B04" opacity="0.5" stroke-width="1">
      <rect x="14" y="150" width="176" height="78"/>
      <rect x="196" y="150" width="100" height="78"/>
    </g>
    <text x="12" y="71" fill="#FFFFFF" opacity="0.6" font-size="11">1.8 GB · 312 files</text>
    <text x="154" y="148" fill="#FFFFFF" font-size="16" text-anchor="middle">.git</text>

    <!-- file (video): render.mp4 -->
    <rect x="308" y="52" width="216" height="182" fill="#4DB6AC" stroke="#004D40"/>
    <g transform="translate(331,58) scale(7.083)" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3,5 3,19 21,19 21,5 3,5"/>
      <polyline points="10,8.5 16,12 10,15.5 10,8.5"/>
    </g>
    <text x="316" y="71" fill="#FFFFFF" opacity="0.6" font-size="11">1.3 GB</text>
    <text x="416" y="148" fill="#FFFFFF" font-size="16" text-anchor="middle">render.mp4</text>

    <!-- folder: photos -->
    <rect x="528" y="52" width="160" height="182" fill="#F9A825" stroke="#582B04"/>
    <g fill="#FBC02D" stroke="#582B04" opacity="0.5" stroke-width="1">
      <rect x="538" y="160" width="140" height="66"/>
    </g>
    <text x="536" y="71" fill="#FFFFFF" opacity="0.6" font-size="11">0.9 GB · 88 files</text>
    <text x="608" y="148" fill="#FFFFFF" font-size="16" text-anchor="middle">photos</text>

    <!-- file (archive): app.dmg -->
    <rect x="692" y="52" width="110" height="182" fill="#4DB6AC" stroke="#004D40"/>
    <g transform="translate(698,94) scale(4.083)" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="12,2.5 20.5,7.25 20.5,16.75 12,21.5 3.5,16.75 3.5,7.25 12,2.5"/>
      <polyline points="3.5,7.25 12,12 20.5,7.25"/>
      <polyline points="12,12 12,21.5"/>
    </g>
    <text x="700" y="71" fill="#FFFFFF" opacity="0.6" font-size="11">0.6 GB</text>
    <text x="747" y="148" fill="#FFFFFF" font-size="14" text-anchor="middle">app.dmg</text>

    <!-- rest brick: collapsed tail of tiny entries, caption truncated to width -->
    <rect x="806" y="52" width="90" height="182" fill="#3C3C3C" stroke="#757575"/>
    <text x="814" y="71" fill="#B0B0B0" font-size="11">… 0.4 GB (214</text>

    <!-- bottom row: big bricks -->
    <!-- big folder: node_modules -->
    <rect x="4" y="238" width="448" height="314" fill="#F9A825" stroke="#582B04"/>
    <!-- nested hint: fills bottom-up, largest at the bottom -->
    <g fill="#FBC02D" stroke="#582B04" opacity="0.5" stroke-width="1">
      <rect x="14" y="430" width="262" height="114"/>
      <rect x="284" y="430" width="158" height="114"/>
      <rect x="14" y="358" width="180" height="64"/>
    </g>
    <text x="12" y="257" fill="#FFFFFF" opacity="0.6" font-size="11">8.2 GB · 48201 files</text>
    <text x="228" y="403" fill="#FFFFFF" font-size="20" text-anchor="middle">node_modules</text>

    <!-- folder: target -->
    <rect x="456" y="238" width="276" height="314" fill="#F9A825" stroke="#582B04"/>
    <g fill="#FBC02D" stroke="#582B04" opacity="0.5" stroke-width="1">
      <rect x="466" y="440" width="158" height="104"/>
      <rect x="632" y="440" width="90" height="104"/>
      <rect x="466" y="366" width="120" height="66"/>
    </g>
    <text x="464" y="257" fill="#FFFFFF" opacity="0.6" font-size="11">4.9 GB · 1203 files</text>
    <text x="594" y="403" fill="#FFFFFF" font-size="18" text-anchor="middle">target</text>

    <!-- file (generic): dataset.parquet — highlighted / active -->
    <rect x="736" y="238" width="160" height="314" fill="#4DB6AC" stroke="#004D40"/>
    <g transform="translate(742,321) scale(6.167)" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6,3 14,3 20,9 20,21 6,21 6,3"/>
      <polyline points="14,3 14,9 20,9"/>
    </g>
    <rect x="736" y="238" width="160" height="314" fill="#FFFFFF" opacity="0.18"/>
    <text x="744" y="257" fill="#FFFFFF" opacity="0.6" font-size="11">2.6 GB</text>
    <text x="816" y="403" fill="#FFFFFF" font-size="15" text-anchor="middle">dataset.parquet</text>
  </g>

  <!-- Status bar: active entry on the left (icon + name · size · %), mouse hints on the right -->
  <rect x="0" y="556" width="900" height="44" fill="#333333"/>

  <!-- Active node: entry icon (file-type glyph) then name · size · % of the whole scan -->
  <g transform="translate(12,570) scale(0.6667)" fill="none" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6,3 14,3 20,9 20,21 6,21 6,3"/>
    <polyline points="14,3 14,9 20,9"/>
  </g>
  <text x="36" y="583" fill="#9E9E9E" font-size="14">dataset.parquet · 2.6 GB · 13%</text>

  <!-- LMB hint -->
  <g transform="translate(740,568)">
    <rect x="0" y="0" width="13" height="20" rx="6" fill="none" stroke="#9E9E9E" stroke-width="1.4"/>
    <path d="M1.2 8 h10.6 v-2.5 a5.3 5.3 0 0 0 -5.3 -5.0 a5.3 5.3 0 0 0 -5.3 5.0 z" fill="#9E9E9E" transform="scale(0.5,1) translate(1.2,0.6)"/>
    <text x="20" y="15" fill="#9E9E9E" font-size="13">select</text>
  </g>
  <!-- RMB hint -->
  <g transform="translate(816,568)">
    <rect x="0" y="0" width="13" height="20" rx="6" fill="none" stroke="#9E9E9E" stroke-width="1.4"/>
    <path d="M1.2 8 h10.6 v-2.5 a5.3 5.3 0 0 0 -5.3 -5.0 a5.3 5.3 0 0 0 -5.3 5.0 z" fill="#9E9E9E" transform="scale(0.5,1) translate(11.4,0.6)"/>
    <text x="20" y="15" fill="#9E9E9E" font-size="13">go up</text>
  </g>
</svg>
